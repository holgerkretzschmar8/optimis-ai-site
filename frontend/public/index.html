  <!-- ═══════════════════════════════════════════════════
             Optimis AI Chatbot Widget
             Transcripts saved to Supabase → chat_transcripts
             ═══════════════════════════════════════════════════ -->
  <script>
    (function () {
          var API_URL  = "https://optimis-ai-site.vercel.app/api/chat";
          var ACCENT   = "#4F46E5";
          var BOT_NAME = "Optimis Assistant";
          var GREETING = "Hi! I'm the Optimis AI assistant 👋 How can I help you today?";

          // Session ID — persists for the browser tab
          var sessionId = sessionStorage.getItem("optimis_chat_session");
          if (!sessionId) {
            sessionId = "sess_" + Math.random().toString(36).slice(2) + Date.now();
            sessionStorage.setItem("optimis_chat_session", sessionId);
          }

          // Conversation history for multi-turn context
          var history = [];

          // Styles
          var style = document.createElement("style");
          style.textContent = [
            "#optimis-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:" + ACCENT + ";border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.2);z-index:99999;display:flex;align-items:center;justify-content:center;transition:transform .2s;}",
            "#optimis-fab:hover{transform:scale(1.08);}",
            "#optimis-fab svg{width:26px;height:26px;fill:white;}",
            "#optimis-win{position:fixed;bottom:92px;right:24px;width:340px;max-height:520px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.15);z-index:99998;display:flex;flex-direction:column;overflow:hidden;transition:opacity .2s,transform .2s;transform-origin:bottom right;}",
            "#optimis-win.hidden{opacity:0;transform:scale(0.92);pointer-events:none;}",
            "#optimis-header{background:" + ACCENT + ";padding:14px 16px;display:flex;align-items:center;gap:10px;color:white;}",
            "#optimis-header .avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:16px;}",
            "#optimis-header .info{flex:1;}",
            "#optimis-header .name{font-weight:600;font-size:14px;}",
            "#optimis-header .status{font-size:11px;opacity:.8;}",
            "#optimis-header .close{background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:0;line-height:1;opacity:.8;}",
            "#optimis-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#f9f9fb;}",
            ".opt-msg{max-width:82%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.5;word-break:break-word;}",
            ".opt-msg.bot{background:#fff;border:1px solid #e5e7eb;border-radius:14px 14px 14px 4px;align-self:flex-start;color:#111;}",
            ".opt-msg.user{background:" + ACCENT + ";color:white;border-radius:14px 14px 4px 14px;align-self:flex-end;}",
            ".opt-typing{font-size:12px;color:#9ca3af;padding:0 4px;}",
            "#optimis-footer{padding:10px 12px;border-top:1px solid #e5e7eb;display:flex;gap:8px;background:#fff;}",
            "#optimis-input{flex:1;border:1px solid #e5e7eb;border-radius:8px;padding:8px 11px;font-size:13px;outline:none;color:#111;background:#f9f9fb;}",
            "#optimis-input:focus{border-color:" + ACCENT + ";}",
            "#optimis-send{background:" + ACCENT + ";border:none;border-radius:8px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;}",
            "#optimis-send svg{width:16px;height:16px;fill:white;}"
          ].join("");
          document.head.appendChild(style);

          // Build DOM
          var fab = document.createElement("button");
          fab.id = "optimis-fab";
          fab.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>';
          fab.setAttribute("aria-label", "Open chat");

          var win = document.createElement("div");
          win.id = "optimis-win";
          win.className = "hidden";
          win.innerHTML =
            '<div id="optimis-header">' +
              '<div class="avatar">✦</div>' +
              '<div class="info"><div class="name">' + BOT_NAME + '</div><div class="status">● Online</div></div>' +
              '<button class="close" id="optimis-close" aria-label="Close">×</button>' +
            '</div>' +
            '<div id="optimis-msgs"></div>' +
            '<div id="optimis-footer">' +
              '<input id="optimis-input" type="text" placeholder="Type a message…" autocomplete="off" />' +
              '<button id="optimis-send" aria-label="Send"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>' +
            '</div>';

          document.body.appendChild(fab);
          document.body.appendChild(win);

          var msgs = document.getElementById("optimis-msgs");

          function addMessage(text, role) {
            var el = document.createElement("div");
            el.className = "opt-msg " + role;
            el.textContent = text;
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
            return el;
          }

          function showTyping() {
            var el = document.createElement("div");
            el.className = "opt-typing";
            el.id = "optimis-typing";
            el.textContent = BOT_NAME + " is typing…";
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
          }

          function removeTyping() {
            var t = document.getElementById("optimis-typing");
            if (t) t.remove();
          }

          function send() {
            var input = document.getElementById("optimis-input");
            var text  = input.value.trim();
            if (!text) return;
            input.value = "";

            addMessage(text, "user");
            history.push({ role: "user", content: text });
            showTyping();

            fetch(API_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ messages: history, sessionId: sessionId })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
              removeTyping();
              var reply = data.message || "Sorry, I couldn't get a response.";
              addMessage(reply, "bot");
              history.push({ role: "assistant", content: reply });
            })
            .catch(function() {
              removeTyping();
              addMessage("Something went wrong. Please try again.", "bot");
            });
          }

          var open = false;
          function toggleChat() {
            open = !open;
            if (open) {
              win.classList.remove("hidden");
              if (msgs.children.length === 0) addMessage(GREETING, "bot");
              setTimeout(function() { document.getElementById("optimis-input").focus(); }, 100);
            } else {
              win.classList.add("hidden");
            }
          }

          fab.addEventListener("click", toggleChat);
          document.getElementById("optimis-close").addEventListener("click", toggleChat);
          document.getElementById("optimis-send").addEventListener("click", send);
          document.getElementById("optimis-input").addEventListener("keydown", function(e) {
            if (e.key === "Enter") send();
          });

        })();
  </script>
